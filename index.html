<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LJ Potential Simulator</title>
    <link data-trunk rel="rust" data-wasm-opt="2" />
    <base data-trunk-public-url />
    <style>
        html { touch-action: manipulation; }
        body { background: #1a1a2e; }
        html, body {
            overflow: hidden;
            margin: 0 !important;
            padding: 0 !important;
            height: 100%;
            width: 100%;
        }
        canvas {
            margin-right: auto;
            margin-left: auto;
            display: block;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        .centered {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #f0f0f0;
            font-size: 24px;
            font-family: sans-serif;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="the_canvas_id"></canvas>
    <div class="centered" id="loading_text">
        <p>Loading...</p>
    </div>
</body>
</html>
